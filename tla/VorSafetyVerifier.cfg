\* TLC configuration for VorSafetyVerifier
\*
\* Run with: tlc VorSafetyVerifier.tla -config VorSafetyVerifier.cfg
\*
\* With 3 states and 3 message tags, TLC will check every possible
\* combination of graph structure, invariant, and verifier result.
\* This is exhaustive within the bound.

CONSTANTS
    States = {s1, s2, s3}
    MessageTags = {ok, rejected, timeout}

SPECIFICATION Spec

INVARIANTS
    TypeOK
    Correctness
    Soundness
    Completeness
    FailClosed
