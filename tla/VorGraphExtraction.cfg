\* TLC configuration for VorGraphExtraction
\*
\* Run with: tlc VorGraphExtraction.tla -config VorGraphExtraction.cfg
\*
\* With 3 declared states, 1 state field, 2 other fields, 2 other atoms,
\* and 2 message tags, TLC checks every possible handler set (up to 4 handlers)
\* and verifies the extracted graph matches the reference.

CONSTANTS
    DeclaredStates = {idle, active}
    StateFieldName = phase
    OtherFieldNames = {mode}
    OtherAtoms = {safe}
    MessageTags = {ok}

SPECIFICATION Spec

INVARIANTS
    GraphCorrectness
    NoPhantomStates
    TransitionsValid
    EmitMapValid
